<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Popey — Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090F;--teal:#00D4A0;--amber:#F5A623;--purple:#9B8FFF;
  --t:#EEF2F7;--t2:rgba(238,242,247,.55);--t3:rgba(238,242,247,.25);
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--fb);overflow:hidden}
body{display:flex;justify-content:center;align-items:flex-start;padding:20px 0 40px}

.phone{width:390px;height:844px;background:var(--bg);border-radius:50px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* STATUS BAR */
.statusbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 8px;font-size:15px;font-weight:600;z-index:10}
.sb-time{font-family:var(--fd);font-size:18px;color:var(--t)}
.sb-right{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t)}
.sb-batt{background:rgba(29,185,84,.2);border:1px solid rgba(29,185,84,.4);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;color:#1DB954}

/* ANIMATED BACKGROUND */
.bg-layer{position:absolute;inset:0;overflow:hidden}

/* Radial glows */
.glow-1{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,160,.12) 0%,transparent 65%);top:-100px;left:-100px;animation:float1 8s ease-in-out infinite}
.glow-2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(155,143,255,.08) 0%,transparent 65%);bottom:-80px;right:-80px;animation:float2 10s ease-in-out infinite}
.glow-3{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.06) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse-glow 4s ease-in-out infinite}

/* Grid */
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,160,.03) 1px,transparent 1px);background-size:48px 48px;animation:grid-fade 3s ease forwards}

/* Floating nodes */
.nodes{position:absolute;inset:0}
.node{position:absolute;border-radius:50%;animation:node-float linear infinite}
.node::after{content:'';position:absolute;inset:0;border-radius:50%;animation:node-pulse 2s ease-in-out infinite}

/* Connection lines (SVG) */
.connections{position:absolute;inset:0;opacity:0;animation:lines-in 1s 1.5s ease forwards}

/* CENTER CONTENT */
.center{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 40px}

/* LOGO */
.logo-wrap{margin-bottom:28px;position:relative;opacity:0;animation:logo-in .8s .3s cubic-bezier(.34,1.56,.64,1) forwards}
.logo-ring{position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(0,212,160,.2);animation:ring-spin 12s linear infinite}
.logo-ring-2{position:absolute;inset:-28px;border-radius:50%;border:1px solid rgba(0,212,160,.08);animation:ring-spin 20s linear infinite reverse}
.logo-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,rgba(0,212,160,.2),rgba(0,212,160,.06));border:1px solid rgba(0,212,160,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(0,212,160,.15),inset 0 1px 0 rgba(255,255,255,.1)}
.logo-text{font-family:var(--fd);font-size:26px;font-weight:800;color:var(--teal);letter-spacing:2px}

/* TITLE */
.splash-title{font-family:var(--fd);font-size:36px;font-weight:800;line-height:1.05;letter-spacing:-.5px;margin-bottom:12px;opacity:0;animation:fadeUp .7s .7s ease forwards}
.splash-title .hl{color:var(--teal);display:block}

/* SUBTITLE */
.splash-sub{font-size:15px;color:var(--t2);line-height:1.6;font-weight:300;margin-bottom:40px;opacity:0;animation:fadeUp .7s .9s ease forwards}
.splash-sub strong{color:var(--t);font-weight:500}

/* LOADING BAR */
.loading-wrap{width:100%;opacity:0;animation:fadeUp .5s 1.1s ease forwards}
.loading-bar-bg{width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:12px}
.loading-bar-fill{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--teal),#00A87E);width:0%;animation:load-progress 2.2s 1.2s cubic-bezier(.4,0,.2,1) forwards}
.loading-steps{display:flex;flex-direction:column;gap:6px}
.loading-step{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3);opacity:0;transition:all .3s}
.loading-step.active{color:var(--t2);opacity:1}
.loading-step.done{color:var(--teal);opacity:1}
.ls-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s}
.loading-step.done .ls-dot{background:var(--teal)}
.loading-step.active .ls-dot{background:var(--amber);animation:step-pulse 1s infinite}

/* BOTTOM TAGLINE */
.tagline{position:absolute;bottom:40px;font-size:11px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;font-weight:600;opacity:0;animation:fadeUp .5s 1.4s ease forwards}

/* KEYFRAMES */
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}
@keyframes pulse-glow{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}}
@keyframes grid-fade{0%{opacity:0}100%{opacity:1}}
@keyframes ring-spin{to{transform:rotate(360deg)}}
@keyframes logo-in{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes load-progress{0%{width:0%}60%{width:70%}80%{width:85%}100%{width:100%}}
@keyframes node-float{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-800px) rotate(360deg)}}
@keyframes node-pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes step-pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes lines-in{to{opacity:1}}

@media(min-width:600px){body{background:#000;padding:40px}.phone{border:1px solid rgba(255,255,255,.1)}}
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="statusbar">
    <div class="sb-time">07:33</div>
    <div class="sb-right"><span>▲▲▲</span><span>5G</span><div class="sb-batt">73%</div></div>
  </div>

  <!-- ANIMATED BG -->
  <div class="bg-layer">
    <div class="grid-bg"></div>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="glow-3"></div>
    <div class="nodes" id="nodes"></div>
    <!-- SVG connection lines -->
    <svg class="connections" width="390" height="844" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(0,212,160,0);stop-opacity:1"/>
          <stop offset="50%" style="stop-color:rgba(0,212,160,.3);stop-opacity:1"/>
          <stop offset="100%" style="stop-color:rgba(0,212,160,0);stop-opacity:1"/>
        </linearGradient>
      </defs>
      <line x1="60" y1="150" x2="195" y2="422" stroke="url(#lg1)" stroke-width=".8"/>
      <line x1="320" y1="200" x2="195" y2="422" stroke="url(#lg1)" stroke-width=".8"/>
      <line x1="80" y1="650" x2="195" y2="422" stroke="url(#lg1)" stroke-width=".8"/>
      <line x1="340" y1="680" x2="195" y2="422" stroke="url(#lg1)" stroke-width=".8"/>
      <line x1="150" y1="100" x2="195" y2="422" stroke="url(#lg1)" stroke-width=".5" opacity=".5"/>
      <line x1="280" y1="750" x2="195" y2="422" stroke="url(#lg1)" stroke-width=".5" opacity=".5"/>
    </svg>
  </div>

  <!-- CENTER -->
  <div class="center">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-ring-2"></div>
      <div class="logo-circle">
        <div class="logo-text">P</div>
      </div>
    </div>

    <!-- TITLE -->
    <div class="splash-title">
      Votre réseau<br>
      <span class="hl">s'active.</span>
    </div>

    <!-- SUBTITLE -->
    <div class="splash-sub">
      Popey analyse votre zone et prépare<br>
      <strong>vos premiers éclaireurs du jour.</strong>
    </div>

    <!-- LOADING -->
    <div class="loading-wrap">
      <div class="loading-bar-bg">
        <div class="loading-bar-fill"></div>
      </div>
      <div class="loading-steps">
        <div class="loading-step" id="step1">
          <div class="ls-dot"></div>
          <span>Chargement de votre profil</span>
        </div>
        <div class="loading-step" id="step2">
          <div class="ls-dot"></div>
          <span>Détection des éclaireurs locaux</span>
        </div>
        <div class="loading-step" id="step3">
          <div class="ls-dot"></div>
          <span>Préparation de votre Daily Card</span>
        </div>
      </div>
    </div>

  </div>

  <!-- TAGLINE -->
  <div class="tagline">Popey · Votre réseau travaille pour vous</div>

</div>

<script>
// ── FLOATING NODES ──
const nodesEl = document.getElementById('nodes');
const nodeConfigs = [
  {x:60,y:650,size:8,color:'rgba(0,212,160,.6)',dur:12,delay:0},
  {x:320,y:680,size:6,color:'rgba(155,143,255,.5)',dur:15,delay:2},
  {x:80,y:150,size:7,color:'rgba(245,166,35,.5)',dur:10,delay:1},
  {x:340,y:200,size:5,color:'rgba(0,212,160,.4)',dur:13,delay:3},
  {x:150,y:100,size:4,color:'rgba(155,143,255,.4)',dur:11,delay:0.5},
  {x:280,y:750,size:5,color:'rgba(0,212,160,.35)',dur:14,delay:1.5},
  {x:200,y:50,size:3,color:'rgba(245,166,35,.3)',dur:9,delay:2.5},
  {x:30,y:400,size:4,color:'rgba(0,212,160,.3)',dur:16,delay:0.8},
  {x:360,y:450,size:3,color:'rgba(155,143,255,.3)',dur:12,delay:1.8},
];

nodeConfigs.forEach(c => {
  const node = document.createElement('div');
  node.className = 'node';
  node.style.cssText = `
    left:${c.x}px; top:${c.y}px;
    width:${c.size}px; height:${c.size}px;
    background:${c.color};
    box-shadow:0 0 ${c.size*3}px ${c.color};
    animation-duration:${c.dur}s;
    animation-delay:-${c.delay}s;
  `;
  nodesEl.appendChild(node);
});

// ── LOADING STEPS ──
const steps = [
  {id:'step1', delay:1300},
  {id:'step2', delay:1900},
  {id:'step3', delay:2500},
];

steps.forEach((s, i) => {
  // Make active
  setTimeout(() => {
    // Done previous
    if(i > 0) {
      const prev = document.getElementById(steps[i-1].id);
      prev.classList.remove('active');
      prev.classList.add('done');
      prev.querySelector('.ls-dot').style.background = 'var(--teal)';
      prev.querySelector('span').textContent = '✓ ' + prev.querySelector('span').textContent;
    }
    const el = document.getElementById(s.id);
    el.classList.add('active');
  }, s.delay);
});

// Final — all done, transition out
setTimeout(() => {
  const last = document.getElementById('step3');
  last.classList.remove('active');
  last.classList.add('done');
  last.querySelector('span').textContent = '✓ ' + last.querySelector('span').textContent;

  // Flash the logo
  const logo = document.querySelector('.logo-circle');
  logo.style.background = 'linear-gradient(145deg,rgba(0,212,160,.4),rgba(0,212,160,.15))';
  logo.style.boxShadow = '0 0 60px rgba(0,212,160,.4)';

  // Fade out after 400ms
  setTimeout(() => {
    document.querySelector('.phone').style.transition = 'opacity .5s ease';
    document.querySelector('.phone').style.opacity = '0';
    setTimeout(() => {
      // Reset for demo loop
      document.querySelector('.phone').style.transition = 'none';
      document.querySelector('.phone').style.opacity = '1';
      logo.style.background = '';
      logo.style.boxShadow = '';
      steps.forEach(s => {
        const el = document.getElementById(s.id);
        el.classList.remove('active','done');
        const span = el.querySelector('span');
        span.textContent = span.textContent.replace('✓ ','');
      });
    }, 600);
  }, 400);
}, 3400);
</script>
</body>
</html>
