<div class="sheet"><div class="frame m1r">
  <style>
    .m1r{--today:#F1EFE9;display:flex;flex-direction:column;}
    /* ① LA DEMANDE */
    .m1r .hook{text-align:center;margin-top:14px;}
    .m1r .hook .big{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:54px;line-height:1;letter-spacing:-.02em;color:#14140F;}
    .m1r .hook .sub{font-size:14px;color:#14140F;margin-top:10px;line-height:1.4;}
    .m1r .hook .sub b{font-weight:600;}
    .m1r .hook .who{font-size:11.5px;color:#6E6E64;margin-top:11px;}
    .m1r .hook .who b{color:#14140F;font-weight:600;}
    .m1r .rule{height:1px;background:#DEDBD2;margin:17px 0;}
    /* ② LA JAUGE */
    .m1r .sec-t{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#6E6E64;font-weight:600;margin-bottom:11px;text-align:center;}
    .m1r .gauge{background:#fff;border:1px solid #1B1B15;border-radius:10px;padding:14px 18px;}
    .m1r .m1-gtop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
    .m1r .m1-gtop .l{font-size:12px;color:#6E6E64;}
    .m1r .m1-gtop .n{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;}
    .m1r .m1-gtop .n span{font-size:12px;font-weight:400;color:#6E6E64;font-family:'Inter',sans-serif;}
    .m1r .m1-bar{height:11px;background:var(--today);border:1px solid #DEDBD2;border-radius:6px;overflow:hidden;}
    .m1r .m1-fill{height:100%;background:#14140F;}
    .m1r .m1-legend{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#A6A69C;}
    .m1r .m1-legend b{color:#14140F;font-weight:600;}
    .m1r .comp{margin-top:13px;}
    .m1r .comp .t{font-size:11.5px;color:#6E6E64;margin-bottom:6px;}
    .m1r .m1-crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #DEDBD2;}
    .m1r .m1-crow:last-of-type{border-bottom:none;}
    .m1r .m1-crow .nm{font-family:'Fraunces',Georgia,serif;font-size:14px;font-weight:500;}
    .m1r .m1-crow .av{font-size:12px;color:#14140F;font-weight:600;}
    .m1r .m1-crow .av i{color:#6E6E64;font-weight:400;font-style:normal;font-size:11px;}
    .m1r .m1-crow .right{display:flex;align-items:center;gap:10px;}
    .m1r .tagweb{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:#6E6E64;border:1px solid #DEDBD2;border-radius:16px;padding:3px 8px;white-space:nowrap;}
    .m1r .synth{margin-top:9px;font-size:11.5px;color:#14140F;text-align:center;line-height:1.5;}
    .m1r .synth b{font-weight:600;}
    .m1r .verdict{text-align:center;margin-top:12px;font-family:'Fraunces',Georgia,serif;font-size:17px;line-height:1.45;}
    .m1r .verdict b{font-weight:600;}
    /* ③ L'ACCUEIL */
    .m1r .zone{display:flex;align-items:stretch;gap:12px;justify-content:center;margin-top:14px;}
    .m1r .card{width:206px;border-radius:11px;padding:13px;display:flex;flex-direction:column;}
    .m1r .arrow{display:flex;align-items:center;color:#A6A69C;flex:none;}
    .m1r .today{background:var(--today);border:1px solid #DEDBD2;text-align:center;align-items:center;justify-content:center;}
    .m1r .today .tg{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#A6A69C;font-weight:600;margin-bottom:9px;}
    .m1r .today .nm{font-family:'Fraunces',Georgia,serif;font-size:14px;font-weight:500;margin-top:6px;}
    .m1r .today .st{font-size:11px;color:#6E6E64;margin-top:6px;line-height:1.35;}
    .m1r .tom{background:#fff;border:1px solid #1B1B15;}
    .m1r .tom .tg{font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:#14140F;font-weight:600;text-align:center;margin-bottom:10px;}
    .m1r .m1-fx{margin-top:11px;padding-top:9px;border-top:1px solid #DEDBD2;}
    .m1r .m1-fx div{font-size:9.5px;color:#14140F;line-height:1.5;display:flex;gap:5px;align-items:flex-start;}
    .m1r .m1-fx div b{font-weight:600;}
    .m1r .m1-fx .ck{color:#6E6E64;flex:none;}
    .m1r .prep{font-size:12.5px;color:#6E6E64;text-align:center;line-height:1.55;max-width:420px;margin:14px auto 0;}
    .m1r .prep b{color:#14140F;font-weight:600;}
    .m1r .stamp{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#A6A69C;text-align:center;margin-bottom:11px;}
  </style>

  <div class="eyebrow">{{diag_eyebrow}}</div>

  <div class="hook">
    <div class="big">{{m1_hook_big}}</div>
    <div class="sub">{{m1_hook_sub}}</div>
    <div class="who">{{cs_who}}</div>
  </div>

  <div class="rule"></div>

  <div class="sec-t">Votre réputation aujourd’hui</div>
  <div class="gauge">{{m1_gauge}}</div>

  <div class="comp">
    <div class="t">{{m1_comp_intro}}</div>
    {{m1_concurrents}}
    <div class="synth">{{m1_synth}}</div>
  </div>

  <div class="verdict">{{m1_verdict}}</div>

  <div class="zone">
    <div class="card today">
      <div class="tg">Aujourd’hui</div>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#A6A69C" stroke-width="1.4"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/><line x1="4" y1="20" x2="20" y2="4"/></svg>
      <div class="nm">{{dest_name}}</div>
      <div class="st">{{m1_today}}</div>
    </div>
    <div class="arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A6A69C" stroke-width="1.5"><line x1="4" y1="12" x2="19" y2="12"/><polyline points="13,6 19,12 13,18"/></svg></div>
    <div class="card tom">
      <div class="tg">Demain — votre site intelligent</div>
      {{demain_m1}}
    </div>
  </div>

  <div class="spacer"></div>
  <div class="prep">{{m1_prep}}</div>
  <div class="stamp">{{cs_stamp}}</div>
  {{cta_full}}
</div></div>
