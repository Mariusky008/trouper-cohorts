<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --paper:#FCFBF9; --ink:#14140F; --ink-soft:#6E6E64; --ink-faint:#A6A69C;
    --hair:#DEDBD2; --dark:#0B0D12; --cream:#FBFAF7; --frame:#1B1B15;
  }
  .si-root *{box-sizing:border-box;}
  .sheet{ background:var(--paper); width:210mm; height:297mm; padding:12mm; color:var(--ink);
    font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .frame{ border:1px solid var(--frame); height:100%; width:100%; padding:14mm 15mm 11mm;
    display:flex; flex-direction:column; }

  .eyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);text-align:center;font-weight:500;}
  .title{font-family:'Fraunces',serif;font-weight:600;font-size:44px;line-height:1.02;text-align:center;margin:14px 0 8px;letter-spacing:-.015em;}
  .addr{font-size:14px;color:var(--ink-soft);text-align:center;margin-bottom:30px;}
  .lead-label{font-size:13px;color:var(--ink-soft);margin-bottom:12px;}
  .lead-label b{color:var(--ink);font-weight:600;}

  /* Bloc « demande » : recherches Google/mois (urgence honnête, chiffre réel) */
  .demand{flex:none;display:flex;align-items:center;gap:9px;border:1px solid #E3D2A2;background:#FBF4E2;
    border-radius:9px;padding:9px 14px;margin:-16px 0 16px;font-size:12.5px;color:#5A4A1E;line-height:1.35;}
  .demand svg{flex:none;}
  .demand b{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:#3A2E10;}

  /* ===== "UNE SEULE HISTOIRE" — hero narratif (le crochet en tête) ===== */
  .hook{text-align:center;margin:6px auto 4px;max-width:474px;}
  .hook-num{font-family:'Fraunces',serif;font-weight:600;font-size:56px;line-height:1;letter-spacing:-.02em;color:var(--ink);}
  .hook-cap{font-family:'Fraunces',serif;font-weight:400;font-size:19px;line-height:1.34;margin-top:8px;color:var(--ink);}
  .hook-cap b{font-weight:600;}
  .hook-cap.big{font-size:27px;font-weight:500;line-height:1.22;letter-spacing:-.01em;margin-top:0;}
  .hook-miss{font-family:'Fraunces',serif;font-weight:500;font-size:14px;color:var(--ink-soft);text-align:center;line-height:1.4;max-width:620px;margin:9px auto 0;}
  /* Nom du destinataire : sous l'eyebrow, avant le chiffre (« ce diagnostic est pour vous »). */
  .hook-id{font-size:15px;color:var(--ink);font-weight:500;text-align:center;margin:11px auto 2px;letter-spacing:.01em;max-width:560px;line-height:1.3;}
  .story-step{font-size:14px;color:var(--ink-soft);text-align:center;margin:2px auto 6px;max-width:452px;line-height:1.42;}
  .story-step b{color:var(--ink);font-weight:600;}
  .story-result{font-size:14.5px;color:var(--ink-soft);text-align:center;line-height:1.5;max-width:462px;margin:0 auto;}
  .story-result b{color:var(--ink);font-weight:600;}
  .proof{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;
    border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);padding:9px 6px;margin:14px auto 0;}
  .proof-lab{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;}
  .proof-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);}
  .proof-item .st{font-size:12px;letter-spacing:1px;}
  .proof-item .st .on{color:var(--ink);} .proof-item .st .off{color:#D8D5CD;}
  /* Micro-mention « mesuré » (remplace le gros bulletin) + « préparé pour vous » */
  .prep-tag{font-size:9.5px;letter-spacing:.05em;color:var(--ink-soft);border:1px solid var(--hair);border-radius:20px;padding:3px 10px;white-space:nowrap;font-weight:600;}
  /* Zone d'en-tête des colonnes avant/après : hauteur fixe pour que les deux
     téléphones restent alignés, que la colonne porte un tag simple ou un pill. */
  .ba-head{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:7px;min-height:46px;margin-bottom:12px;}
  .ba-head .ba-tag{margin-bottom:0;}
  .constate{text-align:center;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:12px 0 0;}
  /* Conséquence rebouclée : une question + les détails (remplace le paragraphe) */
  .story-q{font-family:'Fraunces',serif;font-weight:600;font-size:17px;line-height:1.3;text-align:center;letter-spacing:-.01em;max-width:600px;margin:0 auto;}
  .story-d{font-size:13.5px;color:var(--ink-soft);text-align:center;line-height:1.5;max-width:452px;margin:9px auto 0;}
  .story-d b{color:var(--ink);font-weight:600;}
  /* Bloc de clôture « La nouvelle version optimisée » (recto → renvoi au dos) */
  .closing-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);text-align:center;font-weight:600;margin-bottom:12px;}
  .optim-body{font-size:13px;color:var(--ink-soft);text-align:center;line-height:1.55;max-width:474px;margin:12px auto 0;}
  .optim-body b{color:var(--ink);font-weight:600;}
  /* Ligne « cette version existe déjà » juste avant le renvoi au dos */
  .prepared{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:15px;color:var(--ink);text-align:center;line-height:1.42;max-width:420px;margin:0 auto 11px;}

  /* ---------- SCORECARD (bulletin de note, critères mesurés) ---------- */
  .scorecard{flex:none;border:1px solid var(--frame);border-radius:10px;overflow:hidden;margin:-16px 0 16px;}
  .sc-cap{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);text-align:center;padding:5px 0 4px;border-bottom:1px solid var(--hair);font-weight:600;}
  .sc-row{display:flex;}
  .sc-cell{flex:1;text-align:center;padding:7px 4px;border-right:1px solid var(--hair);}
  .sc-cell:last-child{border-right:none;}
  .sc-l{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;}
  .sc-stars{font-size:14px;letter-spacing:1.5px;line-height:1;}
  .sc-stars .on{color:var(--ink);}
  .sc-stars .off{color:#D8D5CD;}
  .module{display:flex;flex-direction:column;align-items:center;}

  /* ---------- GOOGLE MOCK (SANS_SITE) — narration descendante ---------- */
  .story-scene{font-family:'Fraunces',serif;font-weight:400;font-size:17px;line-height:1.42;text-align:center;color:var(--ink);margin:2px auto 18px;max-width:440px;}
  .story-scene b{font-weight:600;}
  .serp-hint{font-size:12px;color:var(--ink-soft);margin-bottom:2px;letter-spacing:.02em;}
  .serp-down{text-align:center;color:var(--ink-faint);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin:14px 0 8px;}
  .story-conseq{font-size:15px;color:var(--ink-soft);text-align:center;line-height:1.5;max-width:430px;margin:0 auto;}
  .story-conseq b{color:var(--ink);font-weight:600;}
  .rep-line{font-size:14.5px;color:var(--ink-soft);text-align:center;line-height:1.5;max-width:470px;margin:10px auto 0;}
  .rep-line b{color:var(--ink);font-weight:700;}

  /* ── Recto SANS_SITE refondu : Choc → Preuve → Face-à-face → Action ── */
  .ss-hero{text-align:center;margin:6px auto 0;max-width:530px;}
  .ss-num{font-family:'Fraunces',serif;font-weight:600;font-size:76px;line-height:.92;letter-spacing:-.03em;color:var(--ink);}
  .ss-cap{font-family:'Fraunces',serif;font-weight:400;font-size:19px;line-height:1.3;margin-top:9px;color:var(--ink);}
  .ss-cap b{font-weight:600;}
  .ss-cap.big{font-size:25px;font-weight:500;line-height:1.24;margin-top:0;}
  .ss-herosub{font-size:13px;font-style:italic;color:var(--ink-soft);margin-top:8px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.4;}
  .ss-dest{font-size:13px;color:var(--ink-soft);margin-top:13px;letter-spacing:.01em;}
  .ss-dest b{color:var(--ink);font-weight:600;}
  .ss-proof{width:100%;max-width:520px;margin:0 auto;}
  .cc-list{margin-top:2px;}
  .cc-row{display:flex;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid var(--hair);}
  .cc-row:last-child{border-bottom:none;}
  .cc-name{font-family:'Fraunces',serif;font-size:16px;font-weight:500;flex:1;min-width:0;}
  .cc-meta{font-size:12px;color:var(--ink-soft);white-space:nowrap;}
  .cc-site{font-size:10px;letter-spacing:.03em;color:var(--ink-soft);border:1px solid var(--hair);border-radius:5px;padding:3px 9px;white-space:nowrap;}
  /* Face-à-face : deux cartes Avant / Après */
  .faceoff2{display:flex;align-items:stretch;gap:16px;width:100%;max-width:520px;margin:0 auto;}
  .fo-card{flex:1 1 0;min-width:0;border-radius:14px;padding:18px 14px;text-align:center;display:flex;flex-direction:column;gap:9px;}
  .fo-today{background:#F1EFEA;}
  .fo-tomorrow{border:1.5px solid var(--ink);background:var(--paper);}
  .fo-lbl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--ink-faint);}
  .fo-tomorrow .fo-lbl{color:var(--ink);}
  .fo-cn{font-family:'Fraunces',serif;font-size:16px;font-weight:500;color:var(--ink);line-height:1.15;}
  .fo-today .fo-cn{color:var(--ink-soft);}
  .fo-eye{display:flex;justify-content:center;opacity:.9;}
  .fo-invis{font-size:11.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.01em;line-height:1.25;margin-top:1px;}
  .fo-invsub{font-size:9.5px;color:var(--ink-faint);letter-spacing:.03em;}
  .fo-cstars{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;}
  .fo-cstars .off{color:#D8D5CD;}
  .fo-cact{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:auto;padding-top:2px;}
  .fo-cact span{font-size:9.5px;font-weight:600;color:var(--ink);border:1px solid var(--ink);border-radius:6px;padding:4px 9px;}
  /* Carte DEMAIN = mini-aperçu de l'accueil intelligent */
  .ai-card{align-items:stretch;text-align:left;gap:0;}
  .ai-card .fo-lbl{text-align:center;margin-bottom:11px;}
  .ai-bubble{background:#F0EEE7;border-radius:12px;border-bottom-left-radius:4px;padding:8px 11px;font-size:11px;color:var(--ink);align-self:flex-start;max-width:96%;line-height:1.36;}
  .ai-booked{align-self:flex-end;margin-top:9px;background:var(--ink);color:var(--cream);border-radius:20px;padding:5px 12px;font-size:10.5px;font-weight:600;display:inline-flex;gap:5px;align-items:center;white-space:nowrap;}
  .ai-line{font-size:11px;color:var(--ink);margin-top:auto;padding-top:12px;line-height:1.4;font-weight:500;text-align:center;border-top:1px solid var(--hair);}
  .fo-arrow{flex:none;align-self:center;display:flex;}
  .ss-transition{font-size:12.5px;font-style:italic;color:var(--ink-soft);text-align:center;line-height:1.5;max-width:480px;margin:20px auto 0;}
  /* ---- Recto PROFIL C v2 (santé encadrée) : anti-volume, centré patient ---- */
  .cs-hero{text-align:center;}
  .cs-lead{font-family:'Fraunces',serif;font-weight:600;font-size:21px;line-height:1.24;color:var(--ink);letter-spacing:-.01em;max-width:520px;margin:0 auto;}
  .cs-ctx{font-size:14px;color:var(--ink-soft);line-height:1.45;margin:12px auto 0;max-width:470px;}
  .cs-behav{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin:8px auto 0;max-width:500px;}
  .cs-constats{display:flex;flex-direction:column;gap:9px;max-width:544px;margin:0 auto;}
  .cs-constat{display:flex;gap:11px;align-items:flex-start;text-align:left;font-size:13px;line-height:1.42;color:var(--ink-soft);}
  .cs-constat .cs-mark{flex:none;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;margin-top:1px;}
  .cs-constat.warn .cs-mark{background:#F6ECEC;color:#8A2B2B;}
  .cs-constat.soft .cs-mark{background:#EDEBE5;color:#7A756A;}
  .cs-constat .cs-ctxt b{color:var(--ink);font-weight:600;}
  .cs-bascule{text-align:center;font-family:'Fraunces',serif;font-size:16.5px;font-weight:500;line-height:1.4;color:var(--ink);max-width:500px;margin:16px auto 0;}
  .cs-bascule b{font-weight:700;}
  .ss-action{max-width:492px;margin:0 auto;text-align:center;}
  .ss-action p{font-size:13.5px;color:var(--ink);line-height:1.6;margin:0 0 12px;}
  .ss-action .ss-lead{font-weight:600;margin-top:2px;margin-bottom:10px;}
  .ss-bullets{display:inline-block;text-align:left;}
  .ss-bullets div{font-size:13px;color:var(--ink);line-height:1.55;margin:5px 0;}
  .ss-footer{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);text-align:center;margin:12px auto 14px;}
  .cta-full{background:var(--ink);color:#fff;border-radius:12px;padding:16px 18px;text-align:center;font-size:14px;font-weight:600;line-height:1.3;letter-spacing:.01em;}
  .climax{font-family:'Fraunces',serif;font-weight:400;font-size:26px;line-height:1.26;text-align:center;letter-spacing:-.01em;margin:0 0 18px;}
  .climax u{text-decoration:none;border-bottom:2px solid var(--ink);padding-bottom:2px;}
  .search{border:1px solid var(--hair);border-radius:34px;padding:15px 22px;display:flex;align-items:center;gap:14px;font-size:17px;color:var(--ink);margin-bottom:20px;width:100%;}
  .search svg{flex:none;}
  .result{padding:14px 4px;border-bottom:1px solid var(--hair);}
  .result .r-name{font-family:'Fraunces',serif;font-size:19px;font-weight:500;}
  .result .r-meta{font-size:13px;color:var(--ink-soft);margin-top:4px;}
  .result.me{border:1px solid var(--frame);border-radius:9px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:18px;}
  .badge{font-size:11px;letter-spacing:.13em;text-transform:uppercase;border:1px solid var(--frame);border-radius:22px;padding:7px 14px;font-weight:600;white-space:nowrap;}

  /* ---------- AVANT / APRES : DEUX TELEPHONES (MOBILE_CASSE) ---------- */
  /* align-items:flex-start → les deux téléphones s'alignent en haut, même si les
     listes de puces dessous n'ont pas la même hauteur (sinon les phones se décalent). */
  .beforeafter{display:flex;align-items:flex-start;justify-content:center;gap:22px;margin:4px 0 2px;}
  .ba-col{display:flex;flex-direction:column;align-items:center;width:172px;}
  .ba-arrow{color:var(--ink-faint);flex:none;margin-top:134px;}
  .ba-tag{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px;font-weight:600;}
  .phone{width:150px;height:242px;border:2px solid var(--ink);border-radius:26px;padding:4px;background:var(--ink);position:relative;flex:none;}
  .phone::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:34px;height:4px;border-radius:3px;background:rgba(255,255,255,.5);z-index:3;}
  .screen{height:100%;border-radius:22px;overflow:hidden;position:relative;}
  .screen.old{background:#fff;}
  .old-url{background:#EFEDE7;font-size:8px;color:#9A978E;padding:5px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid #E4E1D9;}
  .old-page{width:210px;padding:8px;}
  .old-h{font-family:'Fraunces',serif;font-size:12px;text-align:center;letter-spacing:.02em;}
  .old-nav{font-size:6.5px;color:#7C7A72;text-align:center;margin:3px 0 6px;border-top:1px solid #E4E1D9;border-bottom:1px solid #E4E1D9;padding:3px 0;}
  .old-img{height:34px;background:repeating-linear-gradient(45deg,#E7E4DC,#E7E4DC 5px,#DEDBD3 5px,#DEDBD3 6px);margin-bottom:6px;display:flex;align-items:center;justify-content:center;color:#B7B4AB;font-size:7px;}
  .old-txt div{height:4px;background:#E2DFD7;border-radius:2px;margin-bottom:4px;}
  .old-txt div:nth-child(2){width:96%}.old-txt div:nth-child(3){width:88%}
  .old-txt div:nth-child(4){width:99%}.old-txt div:nth-child(5){width:70%}
  .old-foot{font-size:6px;color:#B4B1A8;text-align:center;margin-top:7px;}
  .old-fade{position:absolute;top:0;right:0;bottom:0;width:26px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff);pointer-events:none;}
  .screen.new{background:var(--dark);color:var(--cream);padding:12px 12px;display:flex;flex-direction:column;}
  .new-name{font-family:'Fraunces',serif;font-weight:600;font-size:12px;line-height:1.14;margin-top:9px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .new-sub{font-size:8px;color:#8E93A0;margin:4px 0 0;letter-spacing:.02em;}
  .new-stars{color:#E8C24A;font-size:9px;letter-spacing:1.5px;margin:6px 0 9px;}
  .new-stars b{color:#EBD9A8;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0;margin-left:3px;}
  /* Étoiles « éteintes » (note < 5) : demi-teinte, pour refléter la vraie note. */
  .new-stars .off,.modern .m-stars .off{color:rgba(232,194,74,.30);}
  .new-hero{height:44px;border-radius:9px;background:linear-gradient(150deg,#242A36,#14171F 60%,#0C0E14);border:1px solid #2A2F3B;margin-bottom:10px;position:relative;overflow:hidden;}
  .new-hero::before{content:"";position:absolute;top:-16px;right:-16px;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle,rgba(232,194,74,.32),transparent 70%);z-index:0;}
  /* Vraie photo Google du pro dans l'aperçu (repli sur le dégradé si absente/erreur) */
  .mk-shot{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:1;display:block;}
  .mk-scrim{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,rgba(11,13,18,.12),rgba(11,13,18,.74));}
  .new-call{background:#E8C24A;color:#14140F;font-weight:700;font-size:11px;text-align:center;padding:10px;border-radius:22px;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:11px;box-shadow:0 3px 10px rgba(232,194,74,.28);}
  .new-chips{display:flex;gap:6px;}
  .new-chips span{flex:1;height:24px;border-radius:6px;background:#171B24;border:1px solid #262B36;}
  .new-spacer{flex:1;}
  .new-tabbar{display:flex;gap:16px;justify-content:center;border-top:1px solid #1D202A;padding-top:8px;}
  .new-tabbar i{width:16px;height:3px;border-radius:2px;background:#2C303B;}
  .ba-points{margin-top:12px;display:flex;flex-direction:column;gap:8px;width:100%;}
  .ba-pt{font-size:12.5px;display:flex;gap:9px;align-items:flex-start;line-height:1.25;}
  .ba-pt.neg{color:var(--ink-soft);}
  .ba-pt.pos{color:var(--ink);}
  .ba-pt .m{flex:none;margin-top:1px;}

  /* ---------- PHONE "site correct" (FUITE_APPEL / SANS_RESA) ---------- */
  .phone2{width:158px;height:278px;border:2px solid var(--ink);border-radius:28px;padding:7px;background:#fff;position:relative;flex:none;}
  .phone2::before{content:"";position:absolute;top:12px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:3px;background:#D8D5CD;z-index:3;}
  .screen2{height:100%;border-radius:20px;overflow:hidden;position:relative;background:#fff;display:flex;flex-direction:column;padding:14px 12px;}
  .ok-name{font-family:'Fraunces',serif;font-weight:600;font-size:15px;text-align:center;margin-top:6px;}
  .ok-sub{font-size:8px;color:var(--ink-faint);text-align:center;margin:4px 0 12px;letter-spacing:.03em;}
  .ok-hero{height:70px;border-radius:8px;background:#EEEBE4;margin-bottom:12px;}
  .ok-lines div{height:5px;background:#E7E4DC;border-radius:3px;margin-bottom:6px;}
  .ok-lines div:nth-child(2){width:88%}.ok-lines div:nth-child(3){width:72%}
  .ok-spacer{flex:1;}
  .ghost-cta{border:1.6px dashed #C1BEB4;border-radius:22px;padding:11px;display:flex;align-items:center;justify-content:center;gap:7px;color:#B4B1A8;font-size:12px;font-weight:600;position:relative;margin-top:6px;}
  .ghost-tag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#fff;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:#B4B1A8;padding:0 6px;white-space:nowrap;}
  .friction{font-size:13px;color:var(--ink-soft);text-align:center;margin-top:13px;line-height:1.5;max-width:360px;}
  .friction b{color:var(--ink);font-weight:600;}
  /* Conclusion visuelle sous l'avant/après : transforme les colonnes en résultat business */
