<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Popey — Être prévenu·e</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#05060a;font-family:'Inter',system-ui,sans-serif;color:#fff;min-height:100dvh;}
  .phone{position:relative;width:100%;max-width:480px;min-height:100dvh;margin:0 auto;background:#0B0D12;display:flex;flex-direction:column;padding:22px 22px 30px;}
  @media(min-width:540px){.phone{min-height:auto;height:auto;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:30px;box-shadow:0 40px 120px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);}}
  .logo{font-family:'Poppins';font-weight:800;font-size:22px;letter-spacing:-.5px;}
  .logo b{color:#34d399;}
  .pill{display:inline-flex;align-self:flex-start;margin-top:4px;font-family:'Poppins';font-weight:700;font-size:11px;padding:5px 11px;border-radius:999px;background:rgba(240,96,143,.16);border:1px solid rgba(240,96,143,.5);color:#ffb4cd;}
  .hero{margin-top:30px;}
  .emoji{font-size:54px;}
  h1{font-family:'Poppins';font-weight:800;font-size:26px;line-height:1.2;margin-top:12px;}
  h1 .mint{color:#34d399;}
  .sub{font-family:'Inter';font-size:14px;color:#aeb2b8;margin-top:10px;line-height:1.5;}
  .form{margin-top:24px;}
  .form input{width:100%;background:#11151d;border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:14px;color:#fff;font-size:15px;font-family:'Inter';margin-bottom:11px;}
  .form input:focus{outline:none;border-color:#34d399;}
  .consent{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:#9aa3b2;margin:4px 0 16px;line-height:1.4;}
  .consent input{margin-top:2px;width:16px;height:16px;accent-color:#34d399;flex:0 0 auto;}
  .msg{font-size:13px;min-height:16px;margin-bottom:10px;}
  .btn{width:100%;border:none;border-radius:15px;padding:16px;font-family:'Poppins';font-weight:800;font-size:16px;cursor:pointer;background:linear-gradient(135deg,#34d399,#22c55e);color:#04130c;box-shadow:0 12px 30px rgba(34,197,94,.3);}
  .btn:disabled{opacity:.5;filter:grayscale(.4);box-shadow:none;}
  .reassure{font-family:'Inter';font-size:12px;color:#7c8493;text-align:center;margin-top:14px;line-height:1.5;}
  .center{text-align:center;padding:50px 10px;}
  .center .big{font-size:60px;margin-bottom:14px;}
  .center h2{font-family:'Poppins';font-weight:800;font-size:22px;margin-bottom:8px;}
  .center p{color:#aeb2b8;font-size:14px;line-height:1.5;}
  .hide{display:none!important;}
</style>
</head>
<body>
<div class="phone">
  <div class="logo">Pop<b>ey</b></div>
  <div class="pill">⚡ Bons plans</div>

  <div id="formView">
    <div class="hero">
      <div class="emoji">⚡</div>
      <h1>Sois prévenu·e <span class="mint">en premier</span><br><span id="merchName">de ce commerçant</span></h1>
      <div class="sub">Quand <b id="merchName2">ce commerçant</b> lâche un « coup de feu » (offre éclair, places limitées), tu reçois un WhatsApp <b>avant tout le monde</b>. Pas de compte, STOP quand tu veux.</div>
    </div>
    <div class="form">
      <div class="msg" id="msg"></div>
      <input id="first" placeholder="Ton prénom" autocomplete="given-name">
      <input id="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="Ton numéro (06…)">
      <label class="consent"><input type="checkbox" id="consent" checked><span>Je veux être prévenu·e par WhatsApp des bons plans de ce commerçant. STOP à tout moment.</span></label>
      <button class="btn" id="subBtn" onclick="submitSub()">⚡ Être prévenu·e en premier</button>
      <div class="reassure">🔒 Ton numéro reste privé. Jamais affiché, jamais revendu.</div>
    </div>
  </div>

  <div id="doneView" class="hide"></div>
</div>

<script>
var P=new URLSearchParams(location.search);
var SID=(P.get('id')||'').trim();
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function loadMember(){try{var s=localStorage.getItem('popey_member');return s?JSON.parse(s):null;}catch(e){return null;}}
function saveMember(first,phone){try{localStorage.setItem('popey_member',JSON.stringify({first:first||'',phone:phone||''}));}catch(e){}}

function load(){
  var m=loadMember();if(m){$('first').value=m.first||'';$('phone').value=m.phone||'';}
  if(!SID){return;}
  fetch('/api/popey-human/privilege/subscribe-merchant?id='+encodeURIComponent(SID),{cache:'no-store'})
    .then(r=>r.json()).then(d=>{
      if(d&&d.merchant){$('merchName').textContent='de '+d.merchant;$('merchName2').textContent=d.merchant;document.title='Popey — '+d.merchant;}
    }).catch(function(){});
}
function submitSub(){
  var first=($('first').value||'').trim(),phone=($('phone').value||'').trim(),consent=$('consent').checked;
  var msg=$('msg');msg.style.color='#FCA5A5';
  if(first.length<2){msg.textContent='Entre ton prénom.';return;}
  if(phone.replace(/[^0-9]/g,'').length<9){msg.textContent='Entre un numéro valide.';return;}
  saveMember(first,phone);$('subBtn').disabled=true;$('subBtn').textContent='Un instant…';
  fetch('/api/popey-human/privilege/subscribe-merchant',{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',
    body:JSON.stringify({id:SID,phone:phone,name:first,consent:consent})})
    .then(r=>r.json().catch(()=>({}))).then(d=>{
      if(!d||d.error){$('subBtn').disabled=false;$('subBtn').textContent='⚡ Être prévenu·e en premier';msg.textContent=(d&&d.error)||'Réessaie.';return;}
      $('formView').classList.add('hide');$('doneView').classList.remove('hide');
      $('doneView').innerHTML='<div class="center"><div class="big">✅</div><h2>C\'est bon'+(first?', '+esc(first):'')+' !</h2><p>Tu es abonné·e. Tu seras prévenu·e <b>en premier</b> du prochain coup de feu — sur WhatsApp. À bientôt en boutique 💚</p></div>';
    }).catch(function(){$('subBtn').disabled=false;$('subBtn').textContent='⚡ Être prévenu·e en premier';msg.textContent='Connexion impossible.';});
}
load();
</script>
</body>
</html>
